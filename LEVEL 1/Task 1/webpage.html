<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aarohi Girls Hostel</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1);
        color: #333;
    }

    /* Navbar */
    nav {
        background: rgba(0,0,0,0.7);
        padding: 15px;
        text-align: center;
    }

    nav a {
        color: white;
        margin: 0 20px;
        text-decoration: none;
        font-size: 18px;
        transition: 0.3s;
    }

    nav a:hover {
        color: #ffcc70;
    }

    /* Hero Section */
    .hero {
        text-align: center;
        padding: 80px 20px;
        color: white;
    }

    .hero h1 {
        font-size: 42px;
    }

    .hero p {
        font-size: 20px;
        margin-top: 10px;
    }

    .hero img {
        margin-top: 20px;
        width: 500px;
        border-radius: 15px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    /* Section */
    .section {
        padding: 40px;
        text-align: center;
    }

    .section h2 {
        margin-bottom: 20px;
        color: #444;
    }

    /* Rooms */
    .rooms {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    .card {
        background: white;
        padding: 15px;
        width: 260px;
        border-radius: 15px;
        box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-10px);
    }

    .card img {
        width: 100%;
        border-radius: 10px;
    }

    /* Form */
    .form-container {
        text-align: center;
        padding: 40px;
    }

    input {
        padding: 12px;
        margin: 10px;
        border-radius: 8px;
        border: none;
        width: 250px;
    }

    button {
        padding: 12px 20px;
        border-radius: 8px;
        border: none;
        background: #ff758c;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff4d6d;
        transform: scale(1.05);
    }

</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <a href="#">Home</a>
    <a href="#">Rooms</a>
    <a href="#">Contact</a>
</nav>

<!-- Hero -->
<div class="hero">
    <h1>Aarohi Girls Hostel</h1>
    <p>Welcome to On Campus Hostel of YCCE</p>
    <img src="hostel image.jpeg" alt="Hostel Image">
</div>

<!-- Rooms -->
<div class="section">
    <h2>Our Rooms</h2>
    <div class="rooms">

        <div class="card">
            <img src="https://via.placeholder.com/250" alt="">
            <h3>Single Room</h3>
            <p>₹3000/month</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250" alt="">
            <h3>Double Sharing</h3>
            <p>₹2000/month</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250" alt="">
            <h3>Triple Sharing</h3>
            <p>₹1500/month</p>
        </div>

    </div>
</div>

<!-- Form -->
<div class="form-container">
    <h2>Book Your Stay</h2>
    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <button>Submit</button>
</div>

</body>
</html>
