<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Hamburger Menu</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

.navbar{
    background:#333;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    position:relative;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.nav-links{
    list-style:none;
    display:flex;
}

.nav-links li{
    margin-left:20px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-size:18px;
    transition:0.3s;
}

.nav-links a:hover{
    color:#00d4ff;
}

#menu-toggle{
    display:none;
}

.hamburger{
    display:none;
    font-size:30px;
    cursor:pointer;
}

/* Mobile View */
@media (max-width:768px){

    .hamburger{
        display:block;
    }

    .nav-links{
        display:none;
        flex-direction:column;
        position:absolute;
        top:65px;
        left:0;
        width:100%;
        background:#444;
        text-align:center;
    }

    .nav-links li{
        margin:15px 0;
    }

    #menu-toggle:checked ~ .nav-links{
        display:flex;
    }
}

.content{
    text-align:center;
    padding:50px 20px;
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">MySite</div>

    <input type="checkbox" id="menu-toggle">

    <label for="menu-toggle" class="hamburger">
        ☰
    </label>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<div class="content">
    <h1>Responsive Navigation Menu</h1>
    <p>The menu collapses into a hamburger icon on smaller screens using CSS media queries.</p>
</div>

</body>
</html>
