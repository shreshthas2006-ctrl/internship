<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Fruit Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    text-align:center;
}

h1{
    margin:20px 0;
    color:#333;
}

/* Gallery Container */
.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

/* Gallery Images */
.gallery img{
    width:350px;
    height:300px;
    object-fit:contain;   /* Full image visible */
    background:white;
    padding:10px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.gallery img:hover{
    transform:scale(1.05);
}

/* Preview Overlay */
.preview{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.preview:target{
    display:flex;
}

/* Large Preview Image */
.preview img{
    max-width:95%;
    max-height:95%;
    background:white;
    padding:10px;
    border-radius:12px;
}

/* Close Button */
.close{
    position:absolute;
    top:20px;
    right:35px;
    color:white;
    font-size:40px;
    text-decoration:none;
    font-weight:bold;
}

/* Tablet */
@media (max-width:768px){

    .gallery img{
        width:45%;
        height:250px;
    }

    h1{
        font-size:28px;
    }
}

/* Mobile */
@media (max-width:480px){

    .gallery{
        flex-direction:column;
        align-items:center;
    }

    .gallery img{
        width:90%;
        height:250px;
    }

    h1{
        font-size:24px;
    }

    .close{
        top:15px;
        right:20px;
        font-size:30px;
    }
}
</style>

</head>
<body>

<h1>🍓 Responsive Fruit Image Gallery</h1>

<div class="gallery">

    <a href="#img1">
        <img src="strawberry.png" alt="Strawberry">
    </a>

    <a href="#img2">
        <img src="https://thf.bing.com/th/id/OIP.Txb27QeU8jQbbvCv3d3wKwHaHa?w=169&h=180&c=7&r=0&o=7&cb=thfc1falcon2&dpr=1.3&pid=1.7&rm=3" alt="Fruit">
    </a>

    <a href="#img3">
        <img src="guava.png" alt="Guava">
    </a>

    <a href="#img4">
        <img src="https://thf.bing.com/th/id/OIP.C9tz92IKscZnmwCfdACWCgHaMS?w=115&h=180&c=7&r=0&o=7&cb=thfc1falcon2&dpr=1.3&pid=1.7&rm=3" alt="Fruit">
    </a>

</div>

<!-- Preview 1 -->
<div id="img1" class="preview">
    <a href="#" class="close">&times;</a>
    <img src="strawberry.png" alt="Strawberry">
</div>

<!-- Preview 2 -->
<div id="img2" class="preview">
    <a href="#" class="close">&times;</a>
    <img src="https://thf.bing.com/th/id/OIP.Txb27QeU8jQbbvCv3d3wKwHaHa?w=169&h=180&c=7&r=0&o=7&cb=thfc1falcon2&dpr=1.3&pid=1.7&rm=3" alt="Fruit">
</div>

<!-- Preview 3 -->
<div id="img3" class="preview">
    <a href="#" class="close">&times;</a>
    <img src="guava.png" alt="Guava">
</div>

<!-- Preview 4 -->
<div id="img4" class="preview">
    <a href="#" class="close">&times;</a>
    <img src="https://thf.bing.com/th/id/OIP.C9tz92IKscZnmwCfdACWCgHaMS?w=115&h=180&c=7&r=0&o=7&cb=thfc1falcon2&dpr=1.3&pid=1.7&rm=3" alt="Fruit">
</div>

</body>
</html>
