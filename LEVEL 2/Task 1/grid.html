<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flower Grid</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f5f5;
    }
    .card:hover {
      transform: scale(1.05);
      transition: 0.3s;
    }
    img {
      height: 200px;
      object-fit: cover;
    }
  </style>
</head>
<body>

<div class="container py-5">
  <h2 class="text-center mb-4">🌸 Flower Collection</h2>

  <div class="row g-4">

    <!-- Rose -->
    <div class="col-12 col-sm-6 col-md-4">
      <div class="card shadow">
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93" class="card-img-top">
        <div class="card-body">
          <h5>Rose</h5>
          <p>Symbol of love and beauty.</p>
        </div>
      </div>
    </div>

    <!-- Sunflower -->
    <div class="col-12 col-sm-6 col-md-4">
      <div class="card shadow">
        <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6" class="card-img-top">
        <div class="card-body">
          <h5>Sunflower</h5>
          <p>Bright flower that follows the sun.</p>
        </div>
      </div>
    </div>

    <!-- Lotus -->
    <div class="col-12 col-sm-6 col-md-4">
      <div class="card shadow">
        <img src="https://images.unsplash.com/photo-1502082553048-f009c37129b9" class="card-img-top">
        <div class="card-body">
          <h5>Lotus</h5>
          <p>Symbol of purity and peace.</p>
        </div>
      </div>
    </div>

    <!-- Tulip -->
    <div class="col-12 col-sm-6 col-md-4">
      <div class="card shadow">
        <img src="https://images.unsplash.com/photo-1520763185298-1b434c919102" class="card-img-top">
        <div class="card-body">
          <h5>Tulip</h5>
          <p>Colorful spring flower.</p>
        </div>
      </div>
    </div>

    <!-- Daisy -->
    <div class="col-12 col-sm-6 col-md-4">
      <div class="card shadow">
        <img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946" class="card-img-top">
        <div class="card-body">
          <h5>Daisy</h5>
          <p>Simple and elegant flower.</p>
        </div>
      </div>
    </div>

    <!-- Orchid -->
    <div class="col-12 col-sm-6 col-md-4">
      <div class="card shadow">
        <img src="https://images.unsplash.com/photo-1504198453319-5ce911bafcde" class="card-img-top">
        <div class="card-body">
          <h5>Orchid</h5>
          <p>Exotic and rare beauty.</p>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
