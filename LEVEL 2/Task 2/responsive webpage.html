<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Webpage</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

/* Header */
header{
    background:#4CAF50;
    color:white;
    text-align:center;
    padding:20px;
}

/* Navigation */
nav{
    display:flex;
    justify-content:center;
    background:#333;
}

nav a{
    color:white;
    text-decoration:none;
    padding:15px 20px;
}

nav a:hover{
    background:#555;
}

/* Cards Container */
.container{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:30px;
    flex-wrap:wrap;
}

/* Card Design */
.card{
    background:white;
    width:300px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h2{
    margin:15px 0;
}

.card p{
    padding:0 15px 20px;
}

/* Footer */
footer{
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
}

/* Tablet View */
@media (max-width:768px){

    nav{
        flex-wrap:wrap;
    }

    .card{
        width:45%;
    }
}

/* Mobile View */
@media (max-width:480px){

    nav{
        flex-direction:column;
        text-align:center;
    }

    .container{
        flex-direction:column;
        align-items:center;
    }

    .card{
        width:90%;
    }

    header h1{
        font-size:24px;
    }
}
</style>

</head>
<body>

<header>
    <h1>My Responsive Page</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

    <div class="card">
        <img src="rose.png" alt="Rose">
        <h2>Rose</h2>
        <p>Roses are beautiful and symbolize love.</p>
    </div>

    <div class="card">
        <img src="sunflower.png" alt="Sunflower">
        <h2>Sunflower</h2>
        <p>Sunflowers follow the sun and look bright.</p>
    </div>

    <div class="card">
        <img src="lotus.png" alt="Lotus">
        <h2>Lotus</h2>
        <p>Lotus is a symbol of purity and peace.</p>
    </div>

</div>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
